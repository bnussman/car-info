name: publish

on: push

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://registry.npmjs.org'
      - run: bun install
      - run: bun run build
      - run: bun run test
      - run: npm publish